// ─── Room Card ────────────────────────────────────────────────────────────────
function RoomCard({ room, selected, onClick }) {
  const booked = room.status === 'Fully Booked';
  return (
    <div
      onClick={onClick}
      className={`room-card bg-white rounded-xl border cursor-pointer flex gap-3 p-3 ${selected ? 'border-blue-400 ring-1 ring-blue-300' : 'border-gray-100 hover:border-gray-200'}`}
    >
      <img src={room.img} alt={room.name} className="w-28 h-20 object-cover rounded-lg flex-shrink-0" />
      <div className="flex-1 min-w-0">
        <div className="flex items-start justify-between gap-2">
          <h3 className="font-semibold text-gray-900 text-sm">{room.name}</h3>
          <div className="flex flex-col items-end gap-1 flex-shrink-0">
            <span className="text-xs text-gray-400">{room.total - room.occupied > 0 ? `${room.total - room.occupied} Rooms Left` : ''}</span>
            <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${booked ? 'bg-red-100 text-red-500' : 'bg-blue-100 text-blue-600'}`}>
              {room.status}
            </span>
          </div>
        </div>
        <p className="text-xs text-gray-400 mt-0.5 line-clamp-2">{room.description}</p>
        <div className="flex items-center justify-between mt-2">
          <div className="flex items-center gap-3 text-xs text-gray-500">
            <span className="flex items-center gap-1"><AreaIcon />{room.area} m²</span>
            <span className="flex items-center gap-1"><BedIcon />{room.bed}</span>
            <span className="flex items-center gap-1"><GuestIcon />{room.guests} guests</span>
            <span className="flex items-center gap-1"><OccupancyIcon />{room.occupied} / {room.total} Rooms – {room.pct}%</span>
          </div>
          <p className="text-sm font-bold text-gray-900 flex-shrink-0">
            ${room.price}<span className="text-xs font-normal text-gray-400">/night</span>
          </p>
        </div>
      </div>
    </div>
  );
}

      </div>
      {/* Thumbnails */}
      <div className="grid grid-cols-5 gap-1.5 mb-4">
        {detailImages.slice(1).map((img, i) => (
          <img
            key={i}
            src={img}
            alt=""
            onClick={() => setMain(i + 1)}
            className={`h-12 w-full object-cover rounded-lg cursor-pointer border-2 transition-all ${main === i + 1 ? 'border-blue-400' : 'border-transparent hover:border-gray-300'}`}
          />
        ))}
      </div>

      {/* Stats row */}
      <div className="flex items-center gap-4 text-xs text-gray-500 mb-4">
        <span className="flex items-center gap-1"><AreaIcon />{room.area} m²</span>
        <span className="flex items-center gap-1"><BedIcon />{room.bed}</span>
        <span className="flex items-center gap-1"><GuestIcon />{room.guests} guests</span>
      </div>

      <p className="text-xs text-gray-500 leading-relaxed mb-5">
        The Deluxe Suite offers a premium stay experience, blending luxury and functionality. Guests enjoy spacious interiors, elegant décor, and a private balcony overlooking the city skyline. Ideal for leisure or business travelers seeking extra comfort and privacy.
      </p>

      {/* Features */}
      <Section title="Features" items={['Private Balcony with City View','Soundproof Windows','Lounge & Workspace Area','Smart Room Controls']} />
      {/* Facilities */}
      <Section title="Facilities" items={['Access to Fitness Center','24/7 Room Service','Rooftop Pool','In-House Restaurant']} />
      {/* Amenities */}
      <Section title="Amenities" items={['Free High-Speed Wi-Fi','Bathrobe, Slippers, and Toiletries','Smart TV with Streaming Apps','In-Room Safe','Minibar & Coffee Maker']} />
    </div>
  );
}

function Section({ title, items }) {
  const half = Math.ceil(items.length / 2);
  const col1 = items.slice(0, half);
  const col2 = items.slice(half);
  return (
    <div className="mb-4">
      <h4 className="text-sm font-semibold text-gray-800 mb-2">{title}</h4>
      <div className="grid grid-cols-2 gap-x-4 gap-y-1.5">
        {col1.map((item, i) => (
          <div key={i} className="flex items-center gap-1.5 text-xs text-gray-600">
            <CheckIcon />{item}
          </div>
        ))}
        {col2.map((item, i) => (
          <div key={i} className="flex items-center gap-1.5 text-xs text-gray-600">
            <CheckIcon />{item}
          </div>
        ))}
      </div>
    </div>
  );
}
